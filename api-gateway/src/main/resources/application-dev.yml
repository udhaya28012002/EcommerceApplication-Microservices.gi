server:
  port: 8080

spring:

  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Route 1: Cart-Service
            - id: cart-service
              uri: http://localhost:9090
              predicates:
                - Path=/api/cart/**
              filters:
                # Add a header to the request
                - AddRequestHeader=X-Gateway, true

                # Add a header to the response
                - AddResponseHeader=X-Response-Time, 100ms

                # Limit request size (protect your service)
                - RequestSize=5MB

                # Retry failed requests
                - name: Retry
                  args:
                    retries: 3
                    statuses: BAD_GATEWAY

            # Route 2: Discount-Service
            - id: discount-service
              uri: http://localhost:9092
              predicates:
                - Path=/api/coupon/**

            # Route 3: Inventory-Service
            - id: inventory-service
              uri: http://localhost:9093
              predicates:
                - Path=/api/inventory/**

            # Route 4: Order-Service
            - id: order-service
              uri: http://localhost:9094
              predicates:
                - Path=/api/orders/**

            # Route 5: Products-Service
            - id: products-service
              uri: http://localhost:9096
              predicates:
                - Path=/api/categories/**,/api/products/**

            # Route 6: Users-Service
            - id: users-service
              uri: http://localhost:9097
              predicates:
                - Path=/api/users/**

            # Route 7: Users-Service
            - id: auth-service
              uri: http://localhost:9097
              predicates:
                - Path=/api/auth/**
                -
            # Route 8: Payment-Service
            - id: payment-service
              uri: http://localhost:9095
              predicates:
                - Path=/api/payments/**

jwt:
  access-token-expiration: 900000
  refresh-token-expiration: 10
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO

    org.springframework.security: TRACE
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.security.authorization: TRACE
    org.springframework.security.web.access: TRACE
    org.springframework.security.web.authentication: TRACE

    org.springframework.web.filter: TRACE

    org.webapp.ecommerce: TRACE

    org.springframework.security.authorization.method: TRACE