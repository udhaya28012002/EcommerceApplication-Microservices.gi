server:
  port: 9095

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment_service
    #username: ${DB_USERNAME}
    username: root
    #password: ${DB_PASSWORD}
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  service-secret: ${JWT_SECRET}
  access-token-expiration: 300000
  refresh-token-expiration: 10

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret-key : ${WEBHOOK_SECRET_KEY}

known-services:
  allowed-services:
    - order-service

logging:
  level:
    org.springframework.security: DEBUG

service-urls:
  order-service-url: http://localhost:9094/api/orders