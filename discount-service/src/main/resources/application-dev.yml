server:
  port: 9092

spring:

  application:
    name: discount-service

  datasource:
    url: jdbc:mysql://localhost:3306/discount_service
    #username: ${DB_USERNAME}
    username: root
    #password: ${DB_PASSWORD}
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: false

jwt:
  access-token-expiration: 900000
  refresh-token-expiration: 10
  service-secret: ${JWT_SECRET}

service-urls:
  users-service-url: http://localhost:9097/api/users
  order-service-url: http://localhost:9097/api/orders

logging:
  level:
    root: INFO

    org.springframework.security: TRACE
    org.springframework.security.web.FilterChainProxy: TRACE
    org.springframework.security.authorization: TRACE
    org.springframework.security.web.access: TRACE
    org.springframework.security.web.authentication: TRACE

    org.springframework.web.filter: TRACE

    org.webapp.ecommerce: TRACE

    org.springframework.security.authorization.method: TRACE

known-services:
  allowed-services:
    - users-service
    - order-service